<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TRAZA·OBRA — Planificación · Delegación 1110 Cádiz</title>
<style>
:root{--navy:#13243C;--pri:#1F4E89;--pri2:#2E75B6;--ok:#1E8E5A;--warn:#B97509;--bad:#C0392B;--acc:#0F8A8A;--pur:#6B4E9E;
--bg:#F4F6F9;--card:#FFF;--line:#E3E8EF;--tx:#1B2430;--dim:#6B7A8D;--rail:224px;--sel:#1F4E89}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--tx)}
button,input,select,textarea{font:inherit;color:inherit}
.app{display:flex;min-height:100vh}
.rail{width:var(--rail);background:var(--navy);color:#DCE5F0;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:30}
.brand{padding:15px 14px;border-bottom:1px solid rgba(255,255,255,.09)}
.brand h1{font-size:16px;color:#fff;letter-spacing:.5px}
.brand span{display:block;font-size:10px;color:#8FA6C0;margin-top:3px}
.nav{padding:8px;flex:1;overflow:auto}
.nav button{width:100%;display:flex;align-items:center;gap:9px;background:none;border:0;color:#C6D4E6;padding:9px 10px;border-radius:8px;cursor:pointer;text-align:left;font-size:12.5px}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.on{background:var(--pri);color:#fff;font-weight:600}
.nav .sep{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:#6E86A5;padding:11px 10px 4px}
.nav .cnt{margin-left:auto;background:rgba(255,255,255,.14);border-radius:10px;padding:1px 6px;font-size:10px}
.nav .cnt.bad{background:var(--bad);color:#fff}
.railfoot{padding:9px 13px;border-top:1px solid rgba(255,255,255,.09);font-size:10px;color:#7E93AE}
.wrap{margin-left:var(--rail);flex:1;display:flex;flex-direction:column;min-width:0}
.top{background:#fff;border-bottom:1px solid var(--line);padding:9px 18px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:25}
.top .clock{margin-left:auto;color:var(--dim);font-size:11.5px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px;padding:12px 18px 0}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.kpi .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim)}
.kpi .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.kpi .s{font-size:10px;color:var(--dim)}
.kpi.a .v{color:var(--pri)}.kpi.g .v{color:var(--ok)}.kpi.w .v{color:var(--warn)}.kpi.b .v{color:var(--bad)}
main{padding:13px 18px 50px;flex:1;min-width:0}
.phead{display:flex;gap:11px;margin-bottom:11px;flex-wrap:wrap;align-items:flex-start}
.phead h2{font-size:17px}.phead .sub{font-size:11.5px;color:var(--dim);margin-top:2px;max-width:800px}
.phead .actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.card{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.card+.card{margin-top:11px}
.card .ch{padding:9px 12px;border-bottom:1px solid var(--line);font-weight:600;font-size:12px;display:flex;gap:8px;align-items:center}
.card .cb{padding:12px}
.btn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-size:12px;white-space:nowrap}
.btn:hover{border-color:var(--pri2);color:var(--pri)}
.btn.pri{background:var(--pri);border-color:var(--pri);color:#fff}.btn.pri:hover{background:var(--pri2);color:#fff}
.btn.sm{padding:3px 7px;font-size:11px}
.btn.dang:hover{border-color:var(--bad);color:var(--bad)}
.btn.on{background:#E8F0FA;border-color:var(--pri2);color:var(--pri);font-weight:600}
table.t{width:100%;border-collapse:collapse;font-size:12.5px}
.t th{background:#F7F9FC;text-align:left;padding:7px 8px;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);border-bottom:1px solid var(--line);white-space:nowrap}
.t td{padding:6px 8px;border-bottom:1px solid #F0F3F7}
.t tr:hover td{background:#FAFCFF}
.tar{text-align:right}.tac{text-align:center}
.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11.5px}
.dim{color:var(--dim)}
.empty{padding:38px;text-align:center;color:var(--dim)}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-pri{background:#E8F0FA;color:var(--pri)}.b-ok{background:#E4F5EC;color:var(--ok)}
.b-warn{background:#FDF1DF;color:var(--warn)}.b-bad{background:#FBEAE8;color:var(--bad)}
.b-gray{background:#F1F3F5;color:var(--dim)}.b-acc{background:#E3F4F4;color:var(--acc)}
.b-pur{background:#EFEAF7;color:var(--pur)}
.searchbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:9px}
.searchbar input,.searchbar select{border:1px solid var(--line);border-radius:8px;padding:5px 8px;background:#fff;font-size:12px}
.searchbar input.q{min-width:190px;flex:1}
.daybar{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-bottom:9px;flex-wrap:wrap}
.daybar .dlabel{font-weight:700;font-size:13.5px;text-transform:capitalize;padding:0 4px}
.daybar input[type=date]{border:1px solid var(--line);border-radius:8px;padding:4px 6px}
/* ---------- REJILLA ---------- */
.gridwrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:calc(100vh - 250px);position:relative}
table.g{border-collapse:separate;border-spacing:0;font-size:12px;table-layout:fixed;width:max-content}
.g th{position:sticky;top:0;z-index:5;background:#EEF2F7;border-bottom:1px solid #CFD8E3;border-right:1px solid #E3E8EF;
  padding:5px 6px;font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:#4A5A6D;font-weight:700;white-space:nowrap;text-align:left}
.g th.rn,.g td.rn{position:sticky;left:0;z-index:6;background:#F7F9FC;width:34px;min-width:34px;text-align:center;
  color:#9AA7B6;font-size:10px;border-right:1px solid #CFD8E3}
.g th.rn{z-index:7}
/* Columnas fijas: FECHA, TECNICOS, CLIENTE se quedan pegadas al desplazar a la derecha */
.g th.fix,.g td.fix{position:sticky;z-index:4;background:#fff}
.g th.fix{z-index:6;background:#EEF2F7}
.g td.fix{background:#FBFCFE;box-shadow:none}
.g tr.hl td.fix{background:#F4F8FD}
.g td.fix.sel{z-index:5}
.g .fixedge{border-right:2px solid #CFD8E3 !important}
@media(max-width:760px){ /* en pantalla estrecha, solo fijar técnico para no apretar */
  .g th.fixcli,.g td.fixcli{position:static;box-shadow:none}
}
.g td{border-bottom:1px solid #EDF1F6;border-right:1px solid #EDF1F6;padding:0;height:26px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;background:#fff}
.g td .cv{padding:4px 6px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:25px;line-height:17px}
.g tr.hl td{background:#FBFDFF}
.g td.sel{outline:2px solid var(--sel);outline-offset:-2px;z-index:3;position:relative;background:#F1F6FD}
.g td.err{background:#FDF0EE}
.g td.err.sel{background:#FBE7E4}
.g td.wrn{background:#FDF9F0}
.g td.ro{background:#F7F9FC;color:var(--dim)}
.g td.num{text-align:right}
.g td input,.g td select{width:100%;height:25px;border:0;padding:3px 5px;font:inherit;background:#fff;outline:2px solid var(--sel);outline-offset:-2px}
.g td .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.gbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-bottom:8px}
.gbar .gsep{width:1px;height:20px;background:var(--line);margin:0 2px}
.keys{font-size:10.5px;color:var(--dim);display:flex;gap:9px;flex-wrap:wrap;padding:7px 12px;border-top:1px solid var(--line);background:#FBFCFE}
kbd{background:#fff;border:1px solid #D7DEE8;border-bottom-width:2px;border-radius:4px;padding:0 4px;font:600 10px ui-monospace,monospace;color:#42536A}
/* Agenda */
.ag{overflow-x:auto}
.agrow{display:flex;align-items:center;border-bottom:1px solid #F0F3F7;min-height:32px}
.agname{width:140px;flex:none;font-size:11.5px;padding:4px 8px;font-weight:600;position:sticky;left:0;background:#fff;z-index:2;border-right:1px solid var(--line)}
.agtrack{flex:1;position:relative;height:28px;min-width:600px;background:repeating-linear-gradient(90deg,#F7F9FC 0 1px,transparent 1px 100%);background-size:calc(100%/18) 100%}
.agbar{position:absolute;top:3px;height:22px;border-radius:5px;color:#fff;font-size:10px;line-height:22px;padding:0 5px;overflow:hidden;white-space:nowrap;cursor:pointer}
.aghead{display:flex;border-bottom:1px solid var(--line);background:#F7F9FC}
.aghead .agname{background:#F7F9FC}
.aghours{flex:1;display:flex;min-width:600px}
.aghours span{flex:1;font-size:9px;color:var(--dim);padding:3px 0 3px 2px;border-left:1px solid var(--line)}
.lg{display:flex;gap:9px;flex-wrap:wrap;font-size:10.5px;color:var(--dim);padding:7px 12px;border-top:1px solid var(--line)}
.lg i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:3px}
.bar{height:7px;background:#EDF1F6;border-radius:5px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--pri2)}
.mask{position:fixed;inset:0;background:rgba(18,28,44,.5);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:24px;overflow:auto}
.mask.show{display:flex}
.modal{background:#fff;border-radius:13px;width:100%;max-width:900px;box-shadow:0 18px 60px rgba(0,0,0,.28)}
.modal h3{padding:13px 16px;border-bottom:1px solid var(--line);font-size:14.5px}
.mbody{padding:14px 16px;max-height:68vh;overflow:auto}
.mfoot{padding:10px 16px;border-top:1px solid var(--line);display:flex;gap:6px;justify-content:flex-end}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.f{display:flex;flex-direction:column;gap:4px}.f.full{grid-column:1/-1}
.f label{font-size:10.5px;color:var(--dim);font-weight:600;text-transform:uppercase}
.f input,.f select{border:1px solid var(--line);border-radius:8px;padding:6px 8px;width:100%}
.hint{font-size:10.5px;color:var(--dim)}
.alert{border-radius:8px;padding:8px 10px;font-size:11.5px;margin-bottom:10px;border:1px solid}
.alert.i{background:#EFF5FC;border-color:#CFE0F3;color:#1B3F6B}
.alert.w{background:#FDF7EC;border-color:#F0DDBC;color:#7A4E06}
.alert.b{background:#FBEAE8;border-color:#F2CFCB;color:#8B2A20}
.alert.g{background:#EDF8F2;border-color:#C8E8D8;color:#0F5B39}
.drop{border:2px dashed #C7D4E4;border-radius:12px;padding:32px;text-align:center;background:#FBFDFF;cursor:pointer}
.drop:hover,.drop.over{border-color:var(--pri2);background:#F2F7FD}
.colchk{display:flex;gap:5px;flex-wrap:wrap}
.colchk label{display:flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:20px;padding:3px 9px;font-size:11.5px;cursor:pointer;background:#fff}
.colchk label.on{background:#E8F0FA;border-color:var(--pri2);color:var(--pri);font-weight:600}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(160%);background:var(--navy);color:#fff;padding:9px 16px;border-radius:10px;font-size:12px;z-index:90;transition:transform .26s;max-width:80vw;box-shadow:0 10px 30px rgba(0,0,0,.3)}
#toast.show{transform:translateX(-50%) translateY(0)}
svg.ic{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}
.g td.lock{background:#FDF7EC}
.g td.lock::after{content:"🔒";float:right;font-size:9px;opacity:.7}
#gate{position:fixed;inset:0;background:linear-gradient(160deg,#13243C,#1F4E89);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
#gate .box{background:#fff;border-radius:16px;width:100%;max-width:420px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
#gate h1{font-size:22px;color:var(--navy);letter-spacing:.5px}
#gate .sb{font-size:12px;color:var(--dim);margin:3px 0 20px}
#gate .f{margin-bottom:12px}
#gate input{border:1px solid var(--line);border-radius:9px;padding:10px 12px;width:100%;font-size:14px}
#gate button{width:100%;background:var(--pri);color:#fff;border:0;border-radius:9px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
#gate button:hover{background:var(--pri2)} #gate button:disabled{opacity:.5;cursor:wait}
#gate .msg{font-size:12px;margin-top:11px;padding:9px 10px;border-radius:8px;display:none}
#gate .msg.err{display:block;background:#FBEAE8;color:#8B2A20;border:1px solid #F2CFCB}
#gate .msg.ok{display:block;background:#EDF8F2;color:#0F5B39;border:1px solid #C8E8D8}
#gate .lnk{font-size:11.5px;color:var(--pri);cursor:pointer;text-align:center;margin-top:14px;text-decoration:underline}
.who{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--dim)}
.who b{color:var(--tx)}
.dot2{width:8px;height:8px;border-radius:50%;background:var(--ok);flex:none}
.dot2.off{background:var(--bad)} .dot2.wait{background:var(--warn)}
.pres{display:flex;gap:3px}
.pres span{width:22px;height:22px;border-radius:50%;background:var(--pri2);color:#fff;font-size:9.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:2px solid #fff;margin-left:-6px}
@media(max-width:900px){:root{--rail:0px}.rail{display:none}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="gate"><div class="box">
  <h1>TRAZA·OBRA</h1>
  <div class="sb">Delegación 1110 · Cádiz · OCA Global</div>
  <div id="gc"></div>
  <div class="msg" id="gmsg"></div>
</div></div>

<div class="app" id="app" style="display:none">
  <aside class="rail">
    <div class="brand"><h1>TRAZA·OBRA</h1><span>Delegación 1110 · Cádiz · OCA Global</span></div>
    <nav class="nav" id="nav"></nav>
    <div class="railfoot">Bloque 1 · v3 · <span id="stg">—</span></div>
  </aside>
  <div class="wrap">
    <header class="top">
      <button class="btn pri" onclick="A.go('plan')"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Planificar</button>
      <button class="btn" onclick="A.go('importar')">Importar</button>
      <button class="btn" onclick="A.exportBackup()">Copia</button>
      <button class="btn" id="eurBtn" onclick="A.toggleEur()">€ ocultos</button>
      <div class="who" id="who"></div>
      <div class="pres" id="pres"></div>
      <div class="clock" id="clock"></div>
    </header>
    <div class="kpis" id="kpis"></div>
    <main id="main"></main>
  </div>
</div>
<div class="mask" id="mask"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<input type="file" id="xlsInput" accept=".xlsx" style="display:none">
<input type="file" id="infInput" accept=".trazaend,.json" style="display:none">
<datalist id="dl_tecnicos"></datalist><datalist id="dl_clientes"></datalist>
<datalist id="dl_centros"></datalist><datalist id="dl_proyectos"></datalist>
<datalist id="dl_ubic"></datalist><datalist id="dl_tecnica"></datalist>
<datalist id="dl_horario"></datalist><datalist id="dl_ot"></datalist>

<script>
/* ============================================================
   TRAZA·OBRA v3 · Bloque 1 — Fase 1
   Rejilla de planificación con las mismas columnas del Excel.
   Servidor: Supabase (PostgreSQL + RLS + Realtime).
   ============================================================ */
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=p=>p+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4);
const now=()=>new Date().toISOString();
let _tt;function toast(m){const t=$('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3800);}
function svg(n){const P={
 cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
 grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',
 up:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/>',
 dl:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>',
 warn:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/>',
 book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
 db:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>',
 prev:'<path d="M15 18l-6-6 6-6"/>',next:'<path d="M9 18l6-6-6-6"/>',
 plus:'<path d="M12 5v14M5 12h14"/>',copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
 trash:'<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>',
 undo:'<path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>',
 users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>',
 eye:'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'};
 return '<svg class="ic" viewBox="0 0 24 24">'+(P[n]||'')+'</svg>';}

/* ============================================================
   CAPA DE DATOS — Supabase
   ============================================================ */
const CFGK='trazaobra_cfg';
function getCfg(){ try{ return JSON.parse(localStorage.getItem(CFGK)||'null'); }catch(e){ return null; } }
function setCfg(url,key){ localStorage.setItem(CFGK, JSON.stringify({url:url.trim().replace(/\/+$/,''),key:key.trim()})); }
function delCfg(){ localStorage.removeItem(CFGK); }

let SB=null;           // cliente supabase
let YO={id:null,nombre:'',rol:'',email:''};
let CANAL=null, ONLINE=false;
const puedoEditar = () => ['delegado','coordinacion'].includes(YO.rol);
const soyDelegado = () => YO.rol==='delegado';

const CAMPOS='id,fecha,tecnicos,tipo,cliente,centro,proyecto,ubicacion,tecnica,codigo,horario,unidades,udmedida,ot,pedido,estado,prod,esti,informes,obs,creado_en,ts,por,creado_por,editando_por,editando_hasta';

function limpiaFila(f){ // deja solo lo que existe en la tabla
  const o={};
  ['fecha','tecnicos','tipo','cliente','centro','proyecto','ubicacion','tecnica','codigo',
   'horario','unidades','udmedida','ot','pedido','estado','prod','esti','informes','obs']
   .forEach(k=>{ let v=f[k];
     if(['unidades','prod','esti'].includes(k)) o[k]=(v===''||v==null)?null:Number(v);
     else o[k]=v==null?'':String(v); });
  if(f.id && /^[0-9a-f-]{36}$/i.test(f.id)) o.id=f.id;
  return o;
}
const DB={
  async load(){
    // Supabase devuelve como mucho 1000 filas por consulta. Para traer todo el
    // histórico hay que pedirlo por páginas (bloques de 1000) hasta agotarlo.
    const PAG=1000; let desde=0, todo=[];
    for(let i=0;i<200;i++){   // tope de seguridad: 200 páginas = 200.000 filas
      const {data,error}=await SB.from('planificacion')
        .select(CAMPOS)
        .order('fecha',{ascending:true})

/* ---------- Parsers ---------- */
function parseHorario(s){
  s=(s||'').trim(); if(!s||s==='-') return {franjas:[],horas:null,ok:false};
  const re=/(\d{1,2})[:.h](\d{2})\s*[-–a]\s*(\d{1,2})[:.h](\d{2})/g; const fr=[]; let m;
  while((m=re.exec(s))){ let a=+m[1]*60+ +m[2], b=+m[3]*60+ +m[4]; if(b<=a)b+=1440; fr.push([a,b]); }
  if(!fr.length) return {franjas:[],horas:null,ok:false};
  return {franjas:fr,horas:Math.round(fr.reduce((t,f)=>t+(f[1]-f[0]),0)/60*100)/100,ok:true};
}
function splitTecnicos(s){ if(!s)return[];
  return String(s).split(/\s*[\/,+&]\s*|\s+Y\s+/i).map(x=>x.replace(/^\*+/,'').trim().toUpperCase()).filter(x=>x&&x!=='-'); }
function splitTecnicas(s){ if(!s)return[]; let x=String(s);
  x=x.replace(/\([^)]*\)/g,'|').replace(/\*/g,'|').replace(/\s+-\s+/g,'|').replace(/\s{2,}/g,'|');
  return x.split(/\s*[\/,+|]\s*/).map(v=>v.trim().toUpperCase().replace(/\s+/g,' ')).filter(v=>v&&v!=='-'&&!/^\d+$/.test(v)); }
function splitOT(s){ if(s==null)return[]; const m=String(s).match(/\d{7,8}/g)||[];
  return [...new Set(m.map(x=>x.replace(/^0+(?=\d{7})/,'')))].filter(x=>x.length===7); }
function horasDe(f){ const h=parseHorario(f.horario); return h.horas; }

/* ---------- Validación por celda ---------- */
function valida(f,k){
  const v=f[k];
  if(k==='fecha') return f.fecha?'':'err';
  if(k==='tecnicos') return (f.tecnicos||'').trim()?'':'wrn';
  if(k==='cliente'){ if(f.tipo==='PRODUCTIVO') return (v||'').trim()?'':'err'; return (v||'').trim()?'wrn':''; }
  if(k==='ot'){ if(f.tipo!=='PRODUCTIVO') return ''; const o=splitOT(v);
    if(!o.length) return 'err'; if(o.length>1) return 'wrn'; return ''; }
  if(k==='horario'){ if(!(v||'').trim()) return 'wrn'; return parseHorario(v).ok?'':'wrn'; }
  if(k==='tecnica'){ if(f.tipo!=='PRODUCTIVO') return '';
    const t=splitTecnicas(v); if(!t.length) return 'wrn';
    return t.every(x=>TECNICAS.includes(x))?'':'wrn'; }
  return '';
}

function derive(){
  const out=[];
  S.filas.forEach(f=>{
    if(!f.fecha) return;
    const h=parseHorario(f.horario);
    const tec=splitTecnicos(f.tecnicos); const lista=tec.length?tec:[''];
    lista.forEach(t=>out.push({fid:f.id,fecha:f.fecha,tecnico:t,tipo:f.tipo||'PRODUCTIVO',cliente:f.cliente||'',centro:f.centro||'',
      proyecto:f.proyecto||'',ubicacion:f.ubicacion||'',tecnicas:splitTecnicas(f.tecnica),tecnicaRaw:f.tecnica||'',
      horario:f.horario||'',franjas:h.franjas,horas:h.horas,ots:splitOT(f.ot),estado:f.estado||'',informes:f.informes||'',
      prod:f.prod,esti:f.esti,obs:f.obs||'',unidades:f.unidades,udmedida:f.udmedida||''}));
  });
  return out;
}

  const a = modo==='dia' ? S.filas.filter(f=>f.fecha===dia)
                         : S.filas.filter(f=>f.fecha>=rango.desde&&f.fecha<=rango.hasta);
  // Orden estable e igual para todos: por fecha del trabajo y, dentro del día,
  // por el momento en que se creó la fila. Sin esto, lo que llega por tiempo real
  // reordenaría la rejilla mientras se está escribiendo.
  return a.sort((x,y)=> (x.fecha===y.fecha)
      ? String(x.creado_en||'').localeCompare(String(y.creado_en||'')) || String(x.id).localeCompare(String(y.id))

}

      return `<td class="${cls}"${stFix} data-r="${ri}" data-c="${ci}" title="${esc(String(txt))}"><span class="cv">${dot}${esc(txt)}</span></td>`;
    }).join('')+`</tr>`;
  }).join('');
  const ne=filas.reduce((t,f)=>t+erroresFila(f).e,0), nw=filas.reduce((t,f)=>t+erroresFila(f).w,0);
  if($('gstat'))$('gstat').innerHTML = (ne?`<span class="badge b-bad">${ne} campo(s) obligatorio(s) sin rellenar</span> `:'')+
    (nw?`<span class="badge b-warn">${nw} aviso(s)</span>`:(ne?'':'<span class="badge b-ok">Todo correcto</span>'));
  pintaSel();
}
function pintaSel(){

function celda(r,c){ const filas=filasDelAmbito(); const cv=colsVis(); return {f:filas[r],col:cv[c]}; }
function edita(){
  const {f,col}=celda(sel.r,sel.c); if(!f||!col||col.ty==='ro') return;
  if(!puedoEditar()){ toast('Tu rol es de <b>solo consulta</b>.'); return; }
  const bq=bloqueada(f);
  if(bq){ toast('Fila en edición por <b>'+esc(bq)+'</b>. Inténtalo en unos segundos.'); return; }
  const td=document.querySelector(`.g td[data-r="${sel.r}"][data-c="${sel.c}"]`); if(!td) return;
  DB.lock(f.id);
  editing=true;
  let el;
  if(col.ty==='sel'){ el=document.createElement('select');
    el.innerHTML=(col.op||[]).map(o=>`<option value="${esc(o)}" ${String(f[col.k]||'')===o?'selected':''}>${esc(o||'—')}</option>`).join('');
  } else { el=document.createElement('input');
    el.type = col.ty==='date'?'date':(col.ty==='num'?'number':'text');
    if(col.ty==='num') el.step='any';
    if(col.dl) el.setAttribute('list',col.dl);
    el.value = f[col.k]==null?'':String(f[col.k]);
  }
  td.innerHTML=''; td.appendChild(el); el.focus();
  if(el.select) try{el.select();}catch(e){}
  const commit=async(mv)=>{ if(!editing) return; editing=false;
    const v=el.value;
    if(mv==='down'){ sel.r=Math.min(filasDelAmbito().length-1,sel.r+1); }
    if(mv==='right'){ sel.c=Math.min(colsVis().length-1,sel.c+1); }
    await setVal(f,col.k,v);
    pintaSel(); const gw=$('gw'); if(gw) gw.focus();
  };
  el.addEventListener('blur',()=>commit());
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();commit('down');}
    else if(e.key==='Tab'){e.preventDefault();commit('right');}
    else if(e.key==='Escape'){e.preventDefault();editing=false;DB.unlock(f.id);pintaFilas();pintaSel();const gw=$('gw');if(gw)gw.focus();}
    e.stopPropagation();
  });
  if(col.ty==='sel') el.addEventListener('change',()=>commit());
}
async function setVal(f,k,v){
  if(!puedoEditar()){ toast('Tu rol es de solo consulta.'); return; }
  const col=COLS.find(c=>c.k===k);
  if(col&&col.ty==='num'){ v=(v===''||v==null)?null:Number(String(v).replace(',','.')); if(isNaN(v))v=null; }
  else if(k==='ot'){ v=String(v||'').replace(/[^\d\s\/,]/g,'').trim(); }
  else if(['cliente','centro','proyecto','tecnicos','tecnica','ubicacion'].includes(k)){ v=String(v||'').trim(); }
  else v=(v==null?'':v);
  const antes=f[k];
  if(String(antes==null?'':antes)===String(v==null?'':v)) return;   // sin cambios
  f[k]=v; inval(); pintaFilas();                                     // pintado optimista
  try{
    const d=await DB.update(f.id,{[k]:v});
    Object.assign(f,d); snapCelda(f.id,k,antes); inval(); pintaFilas(); refreshDL();
  }catch(e){
    f[k]=antes; inval(); pintaFilas();                               // revertir
    toast('No se guardó: '+esc(errTxt(e)));
  }finally{ DB.unlock(f.id); }
}

async function dupDia(){

async function vaciar(){

/* --- Pegado desde Excel --- */
async function pegar(txt){
  if(!puedoEditar()){ toast('Tu rol es de <b>solo consulta</b>.'); return; }
  if(!txt) return;
  const cv=colsVis();
  const rows=txt.replace(/\r/g,'').split('\n').filter((l,i,a)=>!(i===a.length-1&&l===''));
  const parse=(col,val)=>{
    let v=(val==null?'':val).trim();
    if(col.ty==='date'){ const m=/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/.exec(v);
      if(m){let y=+m[3];if(y<100)y+=2000; return y+'-'+String(+m[2]).padStart(2,'0')+'-'+String(+m[1]).padStart(2,'0');}
      return /^\d{4}-\d{2}-\d{2}$/.test(v)?v:undefined; }
    if(col.ty==='num'){ if(v==='')return null; const n=Number(v.replace(/\./g,'').replace(',','.')); return isNaN(n)?null:n; }
    if(col.ty==='sel'&&v){ const hit=(col.op||[]).find(o=>o.toUpperCase()===v.toUpperCase()); return hit!==undefined?hit:v; }
    return v;
  };
  const upd=[], nuevas=[]; let ocupadas=0;
  rows.forEach((line,ri)=>{
    const cells=line.split('\t');
    const f=filasDelAmbito()[sel.r+ri];
    const patch={};
    cells.forEach((val,ci)=>{
      const col=cv[sel.c+ci]; if(!col||col.ty==='ro') return;
      const v=parse(col,val); if(v===undefined) return;
      patch[col.k]=v;
    });
    if(!Object.keys(patch).length) return;
    if(f){ if(bloqueada(f)){ ocupadas++; return; } upd.push({f,patch}); }
    else nuevas.push(Object.assign(FILA0(),{fecha:modo==='dia'?dia:rango.desde},patch));
  });
  if(!upd.length && !nuevas.length){ toast(ocupadas?'Esas filas las está editando otra persona.':'No hay nada que pegar ahí.'); return; }
  toast('Pegando '+(upd.length+nuevas.length)+' fila(s)…');
  try{
    for(const u of upd){
      const d=await DB.update(u.f.id,u.patch);
      Object.assign(u.f,d);
    }
    if(nuevas.length){
      const d=await DB.insertMany(nuevas);
      d.forEach(x=>{ if(!S.filas.some(y=>y.id===x.id)) S.filas.push(x); });
    }
    inval(); pintaFilas(); refreshDL();
    toast('Pegadas '+(upd.length+nuevas.length)+' fila(s)'+(nuevas.length?' ('+nuevas.length+' nueva/s)':'')
      +(ocupadas?' · '+ocupadas+' omitida(s) por estar en edición':'')+'.');
  }catch(e){ toast('Error al pegar: '+esc(errTxt(e))); await recargar(); pintaFilas(); }
}
function copiarSel(){
  const {f,col}=celda(sel.r,sel.c); if(!f||!col) return '';
  if(col.k==='horas'){const h=horasDe(f);return h!=null?String(h):'';}
  return f[col.k]==null?'':String(f[col.k]);
}

function fueraDeRejilla(e){
  // La rejilla solo escucha cuando la app esta abierta y el foco no esta en un
  // campo de formulario (acceso, filtros, barra de fecha, ventanas...).
  if(!APP_LISTA) return true;
  const t=e.target;
  if(!t) return false;
  if(t.closest && (t.closest('#gate')||t.closest('.mask')||t.closest('.searchbar')||t.closest('.daybar')||t.closest('.gbar'))) return true;
  const tag=(t.tagName||'').toLowerCase();
  if(['input','select','textarea','button'].includes(tag) && !(t.closest&&t.closest('.g'))) return true;
  return false;
}
document.addEventListener('keydown',e=>{
  if(view!=='plan'||editing) return;
  if($('mask').classList.contains('show')) return;
  if(fueraDeRejilla(e)) return;
  const filas=filasDelAmbito(), cv=colsVis();
  const nR=filas.length, nC=cv.length; if(!nC) return;
  const k=e.key;
  if(e.ctrlKey||e.metaKey){
    if(k==='d'||k==='D'){e.preventDefault();dupFila();return;}
    if(k==='z'||k==='Z'){e.preventDefault();undo();return;}
    if(k==='c'||k==='C'){ const t=copiarSel(); if(t&&navigator.clipboard) navigator.clipboard.writeText(t); return; }
    return;
  }
  if(k==='ArrowDown'){e.preventDefault();sel.r=Math.min(nR-1,sel.r+1);pintaSel();}
  else if(k==='ArrowUp'){e.preventDefault();sel.r=Math.max(0,sel.r-1);pintaSel();}
  else if(k==='ArrowRight'){e.preventDefault();sel.c=Math.min(nC-1,sel.c+1);pintaSel();}
  else if(k==='ArrowLeft'){e.preventDefault();sel.c=Math.max(0,sel.c-1);pintaSel();}
  else if(k==='Tab'){e.preventDefault(); if(e.shiftKey){ if(sel.c>0)sel.c--; else if(sel.r>0){sel.r--;sel.c=nC-1;} }
    else { if(sel.c<nC-1)sel.c++; else if(sel.r<nR-1){sel.r++;sel.c=0;} } pintaSel();}
  else if(k==='Enter'){e.preventDefault(); if(nR) edita();}
  else if(k==='F2'){e.preventDefault(); if(nR) edita();}
  else if(k==='Insert'){e.preventDefault();addFila();}
  else if(k==='Delete'||k==='Backspace'){e.preventDefault();if(nR)vaciar();}
  else if(k==='Home'){e.preventDefault();sel.c=0;pintaSel();}
  else if(k==='End'){e.preventDefault();sel.c=nC-1;pintaSel();}
  else if(k.length===1&&!e.altKey&&nR){ edita();
    const el=document.querySelector('.g td.sel input,.g td.sel select');
    if(el&&el.tagName==='INPUT'){ el.value=k; e.preventDefault(); } }
});
document.addEventListener('paste',e=>{
  if(view!=='plan'||editing) return;
  if($('mask').classList.contains('show')) return;
  if(fueraDeRejilla(e)) return;   // deja pegar con normalidad en cualquier campo
  const t=(e.clipboardData||window.clipboardData).getData('text/plain');
  if(t){ e.preventDefault(); pegar(t); }
});

const PAL=['#1F4E89','#0F8A8A','#6B4E9E','#1E8E5A','#B97509','#C0392B','#2E75B6','#7A5C2E','#3E7D5A','#8E44AD'];
function colorCli(c){ let h=0; for(const ch of String(c)) h=(h*31+ch.charCodeAt(0))>>>0; return PAL[h%PAL.length]; }
function enAmbito(){ return modo==='dia'?L().filter(l=>l.fecha===dia):L().filter(l=>l.fecha>=rango.desde&&l.fecha<=rango.hasta); }
function filtra(arr){ return arr.filter(l=>{
  if(F.tipo&&l.tipo!==F.tipo) return false;
  if(F.tecnico&&l.tecnico!==F.tecnico) return false;
  if(F.cliente&&l.cliente!==F.cliente) return false;
  if(F.tecnica&&!l.tecnicas.includes(F.tecnica)) return false;
  if(F.ot){const q=F.ot.replace(/\D/g,''); if(q&&!l.ots.some(o=>o.includes(q))) return false;}
  if(F.q){const q=F.q.toLowerCase();
    if(![l.cliente,l.centro,l.proyecto,l.ubicacion,l.tecnico,l.tecnicaRaw,l.obs,l.estado,l.ots.join(' ')].join(' ').toLowerCase().includes(q)) return false;}
  return true;}).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):(a.tecnico||'').localeCompare(b.tecnico||'')); }
const uniqL=(a,f)=>[...new Set(a.map(f).filter(Boolean))].sort();
function solapes(arr){ const out=new Set(),by={};
  arr.forEach(l=>{if(!l.tecnico||!l.franjas.length)return;const k=l.tecnico+'|'+l.fecha;(by[k]=by[k]||[]).push(l);});
  Object.values(by).forEach(g=>{for(let i=0;i<g.length;i++)for(let j=i+1;j<g.length;j++)
    g[i].franjas.forEach(a=>g[j].franjas.forEach(b=>{if(a[0]<b[1]&&b[0]<a[1]){out.add(g[i]);out.add(g[j]);}}));});
  return out; }

async function unzip(buf){
  const dv=new DataView(buf),u8=new Uint8Array(buf); let eocd=-1;
  for(let i=u8.length-22;i>=Math.max(0,u8.length-66000);i--){if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;}}
  if(eocd<0) throw new Error('No es un .xlsx válido.');
  const n=dv.getUint16(eocd+10,true); let off=dv.getUint32(eocd+16,true); const out={};
  for(let i=0;i<n;i++){ if(dv.getUint32(off,true)!==0x02014b50)break;
    const method=dv.getUint16(off+10,true),csize=dv.getUint32(off+20,true);
    const nl=dv.getUint16(off+28,true),el=dv.getUint16(off+30,true),cl=dv.getUint16(off+32,true);
    const lho=dv.getUint32(off+42,true); const name=new TextDecoder().decode(u8.subarray(off+46,off+46+nl));
    const lnl=dv.getUint16(lho+26,true),lel=dv.getUint16(lho+28,true); const ds=lho+30+lnl+lel;
    out[name]={method,raw:u8.subarray(ds,ds+csize)}; off+=46+nl+el+cl; }
  const res={};
  for(const k in out){ if(!/^xl\//.test(k))continue; const e=out[k];
    if(e.method===0) res[k]=new TextDecoder('utf-8').decode(e.raw);
    else if(e.method===8){ if(typeof DecompressionStream==='undefined') throw new Error('Navegador sin soporte. Usa Chrome o Edge.');
      res[k]=await new Response(new Blob([e.raw]).stream().pipeThrough(new DecompressionStream('deflate-raw'))).text(); } }
  return res;
}

  20:'h:mm',21:'h:mm:ss',22:'m/d/yyyy h:mm',45:'mm:ss',46:'[h]:mm:ss',47:'mmss.0'};

    const cx=d.querySelector('cellXfs'); if(cx)cx.querySelectorAll('xf').forEach(x=>styleFmt.push(+(x.getAttribute('numFmtId')||0))); }

      else{const vn=c.querySelector('v'); v=vn?vn.textContent:null;}
      if(v==null||v===''){arr[ci]=null;return;}
      if(t==='s') arr[ci]=sst[+v]!==undefined?sst[+v]:null;
      else if(t==='str'||t==='e') arr[ci]=String(v);

          else{const tt=Math.round(num*1440);arr[ci]={__t:String(Math.floor(tt/60)%24).padStart(2,'0')+':'+String(tt%60).padStart(2,'0')};} }
        else arr[ci]=isNaN(num)?String(v):num; } });

}

const normNom = s => (s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/\s+/g,' ').trim();
// Mapa nombre completo (END) -> nombre corto (planificación OBRA)
const MAP_INSPECTOR = {
  'ALICIA MA BENITEZ GARCIA':'ALICIA','ALICIA MARIA BENITEZ GARCIA':'ALICIA',
  'CLAUDIO ANDRES SANCHEZ CANDON':'CLAUDIO',
  'JOSE LUIS ALFONSO':'LUIS',
  'ALEJANDRO MONTIEL GARCIA':'ALEJANDRO','ALEJANDRO MONTIEL':'ALEJANDRO',
  'FERNANDO REY':'NANDI',
  'ANTONIO CAMACHO REINADO':'ANTONIO',
  'RAUL RAMOS LOPEZ DE LA OSA':'RAUL','RAUL RAMOS LOPEZ':'RAUL',
  'MARIO DIAZ SALTARES':'MARIO',
  'JUAN MANUEL MORENO ROJAS':'JUAN MANUEL','JUAN MORENO':'JUAN MANUEL'
};
function inspectorCorto(nombreEnd){ const n=normNom(nombreEnd); return MAP_INSPECTOR[n]||n; }

async function leerTrazaend(file){
  // Los .trazaend pueden pesar mucho (los PDF van embebidos en "files").
  // Para no cargar 130 MB en memoria, extraemos SOLO el bloque "informes"
  // leyendo el archivo por trozos y cortando en cuanto lo tenemos.
  const CHUNK=4*1024*1024;
  let buf='', encontrado=null;
  const marca='"informes"';
  for(let pos=0; pos<file.size; pos+=CHUNK){
    const trozo=await file.slice(pos,pos+CHUNK).text();
    buf+=trozo;
    const idx=buf.indexOf(marca);
    if(idx>=0){
      // buscar el '[' que abre el array y equilibrar corchetes
      let i=buf.indexOf('[', idx);
      if(i>=0){
        let prof=0, fin=-1, enStr=false, esc=false;
        for(let k=i;k<buf.length;k++){
          const ch=buf[k];
          if(enStr){ if(esc)esc=false; else if(ch==='\\')esc=true; else if(ch==='"')enStr=false; }
          else { if(ch==='"')enStr=true; else if(ch==='[')prof++; else if(ch===']'){prof--; if(prof===0){fin=k;break;}} }
        }
        if(fin>=0){ encontrado=buf.slice(i,fin+1); break; }
        // si no cerró aún, seguimos leyendo más trozos (buf sigue creciendo)
      }
    }
    toast('Leyendo informes… '+Math.min(100,Math.round((pos+CHUNK)/file.size*100))+'%');
  }
  if(!encontrado){
    // plan B: intentar parsear entero (archivos pequeños)
    try{ const j=JSON.parse(await file.text());
      if(j&&j.state&&Array.isArray(j.state.informes)) return j.state.informes; }catch(e){}
    throw new Error('No encuentro los informes en el archivo. ¿Es un .trazaend válido?');
  }
  let arr; try{ arr=JSON.parse(encontrado); }catch(e){ throw new Error('El bloque de informes está dañado.'); }
  if(!Array.isArray(arr)) throw new Error('El bloque de informes no es válido.');
  return arr;
}
function procesarInformes(informes){
  const out=[], rech=[];
  informes.forEach(i=>{
    const num=(i.numInforme||'').trim();
    if(!num){ rech.push({motivo:'Sin nº de informe', raw:i}); return; }
    const fi=(i.fechaInspeccion||'').slice(0,10);
    out.push({
      num_informe: num,
      ot: String(i.ot||'').trim(),
      cliente: (i.cliente||'').trim(),
      proyecto: (i.proyecto||'').trim(),
      equipo: (i.equipo||'').trim(),
      tecnica: (i.tecnica||'').trim(),
      inspector: (i.inspector||'').trim(),
      fecha_inspeccion: /^\d{4}-\d{2}-\d{2}$/.test(fi)?fi:null,
      enviado: !!i.correoEnviado,
      fecha_envio: i.correoFecha||null,
      destino: (i.correoDestino||'').trim()
    });
  });
  return {out,rech};
}
let _prevInf=null;
async function onTrazaend(file){
  try{
    toast('Leyendo '+esc(file.name)+'…');
    const informes=await leerTrazaend(file);
    const {out,rech}=procesarInformes(informes);
    if(!out.length){ toast('No hay informes en el archivo.'); return; }
    _prevInf={out,rech,file:file.name};
    previewInformes(_prevInf);
  }catch(e){ alert('No se pudo leer el archivo de informes:\n\n'+e.message); }
}

async function confirmarImport(){
  const R=_prev; if(!R)return;
  if(!puedoEditar()){ toast('Tu rol es de solo consulta.'); return; }
  closeModal(); toast('Importando al servidor…');
  try{
    if(R.desde) await DB.removeRango(R.desde,R.hasta);
    await DB.insertMany(R.filas);
    S.rechazos=S.rechazos.filter(x=>x.importId!==R.impId).concat(R.rech);
    S.imports.unshift({id:R.impId,ts:now(),file:R.file,filas:R.filas.length,rech:R.rech.length,
      desde:R.desde,hasta:R.hasta,por:YO.nombre});
    S.imports=S.imports.slice(0,20);
    localStorage.setItem('trazaobra_imports',JSON.stringify(S.imports));
    await recargar();
    if(R.desde)dia=R.desde; view='tablero'; render();
    toast('Importadas <b>'+R.filas.length+'</b> filas al servidor ('+fmtCorto(R.desde)+' → '+fmtCorto(R.hasta)+'). Ya las ven todos.');
  }catch(e){ alert('Error al importar:\n\n'+errTxt(e)); }
  _prev=null;
}

function exportBackup(){ const b=new Blob([JSON.stringify({app:'TRAZA-OBRA',v:4,generated:now(),by:YO.nombre,state:{filas:S.filas}})],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='TRAZA-OBRA_'+todayISO()+'.trazaobra';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1500); toast('Copia exportada ('+S.filas.length+' filas).'); }
function exportCSV(todo){
  const filas = todo?S.filas.slice():filasDelAmbito();
  if(!filas.length){toast('No hay filas.');return;}
  const H=COLS.map(c=>c.t); const q=s=>'"'+String(s==null?'':s).replace(/"/g,'""')+'"';
  const rows=filas.map(f=>COLS.map(c=>{ if(c.k==='horas'){const h=horasDe(f);return h!=null?String(h).replace('.',','):'';}
    if(c.ty==='date')return fmtCorto(f[c.k]); if(c.ty==='num')return f[c.k]==null?'':String(f[c.k]).replace('.',',');
    return f[c.k]==null?'':f[c.k]; }).map(q).join(';'));
  const csv='\uFEFF'+H.map(q).join(';')+'\r\n'+rows.join('\r\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='TRAZA-OBRA_'+(todo?'completo':(modo==='dia'?dia:rango.desde+'_'+rango.hasta))+'.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1500); toast(filas.length+' fila(s) exportadas.');
}
function normaliza(x){ const d={meta:{app:'TRAZA-OBRA',v:3,created:now()},cfg:{usuario:'',eur:false,colExt:true},filas:[],rechazos:[],imports:[]};
  const o=Object.assign({},d,x||{}); o.meta=Object.assign({},d.meta,o.meta||{}); o.cfg=Object.assign({},d.cfg,o.cfg||{});
  ['filas','rechazos','imports'].forEach(k=>{if(!Array.isArray(o[k]))o[k]=[];});
  o.filas=o.filas.map(f=>Object.assign(FILA0(),f)); return o; }

function gmsg(t,cls){ const m=$('gmsg'); m.className='msg '+(cls||'err'); m.innerHTML=t; }
function gclear(){ const m=$('gmsg'); m.className='msg'; m.innerHTML=''; }

function pantallaConfig(){
  $('gc').innerHTML=`
    <div class="f"><input id="g_url" placeholder="https://xxxxxxxx.supabase.co" autocomplete="off"></div>
    <div class="f"><input id="g_key" placeholder="Clave pública (empieza por sb_publishable_ o por eyJ)" autocomplete="off"></div>
    <button id="g_btn">Conectar</button>
    <div class="lnk" onclick="A.ayudaCfg()">¿De dónde saco estos dos datos?</div>`;
  $('g_btn').onclick=async()=>{
    let url=$('g_url').value.trim().replace(/\/+$/,''), key=$('g_key').value.trim().replace(/\s+/g,'');
    if(url && !/^https?:\/\//i.test(url)) url='https://'+url;       // admite pegarla sin https://
    let u=null; try{ u=new URL(url); }catch(e){ u=null; }
    if(!u){ gmsg('Esa dirección no es válida. Debe ser parecida a <b>https://xxxxxxxx.supabase.co</b>'); return; }
    if(u.protocol!=='https:'){ gmsg('La dirección debe empezar por <b>https://</b>'); return; }
    if(!/^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+$/i.test(u.hostname)){
      gmsg('Esa dirección no es válida. Cópiala de <b>Settings → API → Project URL</b>: es parecida a <b>https://xxxxxxxx.supabase.co</b>'); return; }
    if(!/supabase/i.test(u.hostname) && !confirm('La dirección no parece de Supabase:\n\n'+u.origin+'\n\n¿Seguro que es correcta?')) return;
    url=u.origin;
    if(!key){ gmsg('Falta la clave pública.'); return; }
    if(/^sb_secret_/i.test(key) || /service_role/i.test(key)){
      gmsg('Esa es una clave <b>secreta</b> (sb_secret_ / service_role). <b>No la uses aquí</b>: se salta la seguridad. Copia la clave <b>publishable</b> (sb_publishable_…) o la <b>anon public</b> (eyJ…).'); return; }
    const claveOk = /^sb_publishable_/i.test(key) || /^eyJ/.test(key);
    if(!claveOk){ gmsg('La clave debe empezar por <b>sb_publishable_</b> o por <b>eyJ</b>. Cópiala del apartado de claves <b>públicas / publishable</b> en Supabase → Settings → API Keys.'); return; }
    setCfg(url,key); gmsg('Guardado. Conectando…','ok'); setTimeout(()=>location.reload(),500);
  };
  $('g_url').focus();
}
function pantallaLogin(){
  $('gc').innerHTML=`
    <div class="f"><input id="g_mail" type="email" placeholder="Correo" autocomplete="username"></div>
    <div class="f"><input id="g_pass" type="password" placeholder="Contraseña" autocomplete="current-password"></div>
    <button id="g_btn">Entrar</button>

    const email=$('g_mail').value.trim(), password=$('g_pass').value;

    $('g_btn').disabled=true; gmsg('Comprobando…','ok');
    const {error}=await SB.auth.signInWithPassword({email,password});
    if(error){
      $('g_btn').disabled=false;
      gmsg(/Invalid login/i.test(error.message)
        ? 'Correo o contraseña incorrectos.'
        : (/Email not confirmed/i.test(error.message)
            ? 'Tu usuario no está confirmado. El delegado debe activar <b>Auto Confirm User</b> en Supabase.'
            : esc(error.message)));
      return;
    }
    gclear(); await entrarApp();
  };
  $('g_btn').onclick=entrar;
  ['g_mail','g_pass'].forEach(id=>$(id).addEventListener('keydown',e=>{ if(e.key==='Enter') entrar(); }));
  $('g_mail').focus();

async function cargaPerfil(){
  const {data:{user}}=await SB.auth.getUser();
  if(!user) return false;
  YO.id=user.id; YO.email=user.email||'';
  const {data,error}=await SB.from('perfiles').select('id,nombre,rol,activo').eq('id',user.id).maybeSingle();
  if(error||!data){ YO.nombre=YO.email; YO.rol=''; return true; }
  YO.nombre=data.nombre; YO.rol=data.activo?data.rol:''; return true;
}

  }).join('');

function suscribir(){
  if(CANAL) try{ SB.removeChannel(CANAL); }catch(e){}
  CANAL=SB.channel('traza-obra')
    .on('postgres_changes',{event:'*',schema:'public',table:'planificacion'},p=>{
      const nuevo=p.new, viejo=p.old;
      if(p.eventType==='INSERT'){
        if(!S.filas.some(x=>x.id===nuevo.id)) S.filas.push(nuevo);
      } else if(p.eventType==='UPDATE'){
        const i=S.filas.findIndex(x=>x.id===nuevo.id);
        const edt = editing ? (celda(sel.r,sel.c).f||{}).id : null;
        if(i>=0){ if(edt===nuevo.id){ // estoy escribiendo en esa fila: no la piso
                    S.filas[i].editando_por=nuevo.editando_por; S.filas[i].editando_hasta=nuevo.editando_hasta;
                  } else S.filas[i]=nuevo; }
        else S.filas.push(nuevo);
      } else if(p.eventType==='DELETE'){
        S.filas=S.filas.filter(x=>x.id!==(viejo&&viejo.id));
      }
      inval();
      if(!editing){ if(view==='plan') pintaFilas(); else render(); }
    })
    .on('presence',{event:'sync'},()=>{
      const st=CANAL.presenceState(); const l=[];
      Object.values(st).forEach(arr=>arr.forEach(x=>l.push(x)));
      pintaPres(l);
    })
    .subscribe(async st=>{
      ONLINE = (st==='SUBSCRIBED');
      pintaWho();
      if(ONLINE) await CANAL.track({id:YO.id,nombre:YO.nombre});
    });
}
async function entrarApp(){
  await cargaPerfil();
  if(!YO.rol){
    gmsg('Tu usuario existe pero <b>no tiene rol asignado</b> o está inactivo.<br>Pide al delegado que ejecute el bloque 2.2.','err');
    $('gc').innerHTML=`<button onclick="A.salir()">Salir</button>`;
    return;
  }
  await cargaPerfiles();
  const ok=await recargar();
  if(!ok){ gmsg('No se pudo leer la planificación. Revisa la conexión.','err'); return; }
  // Cargar los informes ya guardados en el servidor (subidos en sesiones anteriores)
  try{ S.informes=await DB.loadInformes(); S.control=await DB.controlInformes(); }
  catch(e){ S.informes=S.informes||[]; S.control=S.control||[]; }
  $('gate').style.display='none';
  $('app').style.display='flex';
  APP_LISTA=true;
  cargaPrefs();
  const f=S.filas.map(x=>x.fecha).filter(Boolean).sort();
  if(f.length&&!f.includes(dia)) dia=f[f.length-1];
  const st=$('stg'); if(st) st.textContent='Supabase · '+(YO.rol||'');
  pintaWho(); suscribir();
  tick(); setInterval(tick,30000);
  setInterval(()=>{ if(view==='plan'&&!editing) pintaFilas(); },20000); // refresca candados caducados
  render();
  copiasAlArrancar();   // Bloque 2.6: copia diaria en servidor + Excel a Drive
}
/* ============================================================
   BLOQUE 2.6 · Copias de seguridad
   C: dispara la copia diaria en el servidor (la 1ª persona del día).
   B: si hace >24h, descarga un Excel automático para Drive.
   ============================================================ */
async function copiaServidorDiaria(){
  try{
    const {data,error}=await SB.rpc('crear_backup');
    if(error) return;
    const r=Array.isArray(data)?data[0]:data;
    if(r&&r.hecho) toast('Copia de seguridad diaria guardada en el servidor ('+(r.n_filas||0)+' filas).');
  }catch(e){ /* silencioso: la copia no debe molestar */ }
}
function excelAutomaticoDrive(){
  try{
    const K='trazaobra_ultima_copia_excel';
    const ult=+(localStorage.getItem(K)||0);
    const h=Date.now()-ult;
    if(h < 24*3600*1000) return;           // menos de 24h: nada
    if(!S.filas.length) return;            // nada que copiar
    // Descargar Excel/CSV completo
    exportCSV(true);
    localStorage.setItem(K,String(Date.now()));
    setTimeout(()=>toast('📥 Copia diaria descargada. <b>Guárdala en tu carpeta de Drive.</b>'),1200);
  }catch(e){}
}
async function copiasAlArrancar(){
  await copiaServidorDiaria();   // C — servidor
  excelAutomaticoDrive();        // B — Excel a Drive
}
async function pintaCopias(){
  const box=$('bkbox'); if(!box) return;
  try{
    const {data,error}=await SB.from('backups').select('dia,creado_en,n_filas').order('dia',{ascending:false});
    if(error) throw error;
    if(!data||!data.length){ box.innerHTML='<div class="dim">Aún no hay copias. Se creará una hoy al usar la app.</div>'; return; }
    box.innerHTML=`<table class="t"><thead><tr><th>Día</th><th class="tar">Filas</th><th>Hora</th><th></th></tr></thead><tbody>
      ${data.map(b=>`<tr><td class="mono">${esc(fmtCorto(b.dia))}</td><td class="tar mono">${b.n_filas}</td>
        <td class="dim">${esc(new Date(b.creado_en).toLocaleString('es-ES'))}</td>
        <td class="tar"><button class="btn sm dang" onclick="A.restaurar('${b.dia}',${b.n_filas})">Restaurar</button></td></tr>`).join('')}
    </tbody></table>
    <div class="lg">Restaurar sustituye TODA la planificación actual por la foto de ese día. Se conservan 30 días.</div>`;
  }catch(e){ box.innerHTML='<div class="dim">No se pudieron cargar las copias.</div>'; }
}
A.ayudaCfg=()=>{

    · <b>Project URL</b> → primer recuadro<br>
    · La clave <b>publishable</b> (sb_publishable_…) o <b>anon public</b> (eyJ…) → segundo recuadro<br>
    · <b>Nunca</b> la clave secreta (sb_secret_… / service_role)<br><br>
    <b>Nunca uses la clave service_role.</b>`,'ok');
};
A.salir=async()=>{ try{ if(SB) await SB.auth.signOut(); }catch(e){} location.reload(); };
A.config=()=>{ if(!confirm('Se olvidará la dirección del servidor en este equipo. ¿Continuar?'))return; delCfg(); location.reload(); };

(async function(){

<script>
/* ============================================================
   BLOQUE CALENDARIO · Notas generales con recordatorio
   100% ADITIVO — script propio, se pega al final del archivo.
   ============================================================ */
(function(){
if(typeof S==='undefined'||!S){ setTimeout(arguments.callee,400); return; }
if(window.__calListo) return; window.__calListo=true;

if(!S.notas) S.notas=[];
let calYM = todayISO().slice(0,7);
let _avisoHecho = false;

const NOTAS = {
  async load(){
    const {data,error}=await SB.from('notas')
      .select('id,fecha,texto,recordatorio,autor,creado_en')
      .order('fecha',{ascending:true}).order('creado_en',{ascending:true});
    if(error) throw error; return data||[];
  },
  async insert(n){
    const {data,error}=await SB.from('notas')
      .insert({fecha:n.fecha,texto:n.texto,recordatorio:!!n.recordatorio,autor:n.autor||null})
      .select('id,fecha,texto,recordatorio,autor,creado_en').single();
    if(error) throw error; return data;
  },
  async update(id,patch){
    const {data,error}=await SB.from('notas').update(patch).eq('id',id)
      .select('id,fecha,texto,recordatorio,autor,creado_en').single();
    if(error) throw error; return data;
  },
  async remove(id){ const {error}=await SB.from('notas').delete().eq('id',id); if(error) throw error; }
};

function calAdd(ym,delta){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-1+delta,1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function calNombreMes(ym){ const [y,m]=ym.split('-').map(Number);
  return new Date(y,m-1,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'}); }
function calCeldas(ym){
  const [y,m]=ym.split('-').map(Number);
  const primer=new Date(y,m-1,1); const desplaz=(primer.getDay()+6)%7;
  const ini=new Date(y,m-1,1-desplaz); const out=[];
  for(let i=0;i<42;i++){ const d=new Date(ini.getFullYear(),ini.getMonth(),ini.getDate()+i);
    const iso=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
    out.push({iso,dia:d.getDate(),inMes:(d.getMonth()===m-1)}); }
  return out;
}
function _calCSS(){
  if(document.getElementById('calcss')) return;
  const st=document.createElement('style'); st.id='calcss';
  st.textContent=`
  .cahead{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .cahead>div{text-align:center;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase}
  .cagrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cacell{min-height:66px;border:1px solid var(--line);border-radius:8px;padding:5px 6px;cursor:pointer;position:relative;background:#fff}
  .cacell:hover{background:#F2F7FD;border-color:var(--pri2)}
  .cacell.out{background:#FAFBFD}.cacell.out .cadia{color:#B9C4D2}
  .cacell.hoy{border:2px solid var(--pri);background:#EEF5FC}
  .cadia{font-size:12.5px;font-weight:600}
  .cacount{position:absolute;bottom:5px;right:5px;background:var(--pri);color:#fff;border-radius:10px;font-size:10px;padding:1px 7px;font-weight:600;white-space:nowrap}
  .cacount.rem{background:var(--warn)}
  .canota{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;background:#fff}
  .canota textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font:inherit;resize:vertical}
  @media(max-width:640px){.cacell{min-height:52px}}`;
  document.head.appendChild(st);
}
function vCalendario(){
  _calCSS();
  const ym=calYM, hoy=todayISO();
  const celdas=calCeldas(ym);
  const byDay={}; (S.notas||[]).forEach(n=>{ (byDay[n.fecha]=byDay[n.fecha]||[]).push(n); });
  const dow=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const prox=(S.notas||[]).filter(n=>n.recordatorio && n.fecha>=hoy)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,8);
  const gridHTML=celdas.map(c=>{
    const arr=byDay[c.iso]||[]; const rem=arr.some(n=>n.recordatorio);
    const cls=['cacell',c.inMes?'':'out',c.iso===hoy?'hoy':''].filter(Boolean).join(' ');
    const marca=arr.length?`<span class="cacount ${rem?'rem':''}">${rem?'🔔':''}${arr.length}</span>`:'';
    return `<div class="${cls}" onclick="A.abrirDia('${c.iso}')"><span class="cadia">${c.dia}</span>${marca}</div>`;
  }).join('');
  $('main').innerHTML=`
  <div class="phead"><div><h2>Calendario de notas</h2>
    <div class="sub">Notas generales de la delegación. Marca <b>🔔 recordatorio</b> y saltará un aviso el día indicado al abrir la app. Las ven el delegado y las coordinadoras.</div></div>
    <div class="actions"><button class="btn" onclick="A.recargarNotas()">Actualizar</button></div></div>
  <div class="daybar">
    <button class="btn sm" onclick="A.calMes(-1)">${svg('prev')}</button>
    <button class="btn sm" onclick="A.calHoy()">Hoy</button>
    <button class="btn sm" onclick="A.calMes(1)">${svg('next')}</button>
    <div class="dlabel">${esc(calNombreMes(ym))}</div>
    ${puedoEditar()?'':'<span class="dim" style="margin-left:8px">Solo consulta</span>'}</div>
  <div class="card"><div class="cb" style="padding:10px">
    <div class="cahead">${dow.map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cagrid">${gridHTML}</div></div></div>
  ${prox.length?`<div class="card"><div class="ch">🔔 Próximos recordatorios</div>
    <table class="t"><thead><tr><th>Día</th><th>Nota</th><th>Autor</th><th></th></tr></thead><tbody>
    ${prox.map(n=>`<tr><td class="mono">${esc(fmtCorto(n.fecha))}${n.fecha===hoy?' <span class="badge b-warn">hoy</span>':''}</td>
      <td>${esc(n.texto.slice(0,80))}${n.texto.length>80?'…':''}</td>
      <td class="dim">${esc(n.autor||'—')}</td>
      <td class="tar"><button class="btn sm" onclick="A.abrirDia('${n.fecha}')">Abrir</button></td></tr>`).join('')}
    </tbody></table></div>`:''}`;
}
function abrirDia(iso,editId){
  const notas=(S.notas||[]).filter(n=>n.fecha===iso)
    .sort((a,b)=>String(a.creado_en).localeCompare(String(b.creado_en)));
  const puede=puedoEditar();
  const filas=notas.map(n=>{
    if(editId && String(n.id)===String(editId)){
      return `<div class="canota">
        <textarea id="ednota_txt">${esc(n.texto)}</textarea>
        <label style="display:flex;gap:6px;align-items:center;margin:8px 0;font-size:12px">
          <input type="checkbox" id="ednota_rec" ${n.recordatorio?'checked':''}> Avisar el ${esc(fmtCorto(iso))} (recordatorio)</label>
        <button class="btn pri sm" onclick="A.guardarEdicionNota('${n.id}','${iso}')">Guardar</button>
        <button class="btn sm" onclick="A.abrirDia('${iso}')">Cancelar</button></div>`;
    }
    return `<div class="canota">
      <div>${n.recordatorio?'<span class="badge b-warn">🔔 recordatorio</span> ':''}${esc(n.texto).replace(/\n/g,'<br>')}</div>
      <div class="dim" style="font-size:10.5px;margin-top:4px">${esc(n.autor||'—')} · ${esc(fmtCorto((n.creado_en||'').slice(0,10)))}</div>
      ${puede?`<div style="margin-top:6px"><button class="btn sm" onclick="A.abrirDia('${iso}','${n.id}')">Editar</button>
        <button class="btn sm dang" onclick="A.borrarNota('${n.id}','${iso}')">Borrar</button></div>`:''}</div>`;
  }).join('') || '<div class="dim" style="padding:8px 0">Sin notas este día.</div>';
  const alta=puede?`<div class="card" style="margin-top:8px"><div class="ch">Nueva nota</div><div class="cb">
    <textarea id="nota_txt" placeholder="Escribe la nota…" style="width:100%;min-height:64px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font:inherit;resize:vertical"></textarea>
    <label style="display:flex;gap:6px;align-items:center;margin-top:8px;font-size:12px">
      <input type="checkbox" id="nota_rec"> Avisar el ${esc(fmtCorto(iso))} (recordatorio)</label>
    <div style="margin-top:8px"><button class="btn pri" onclick="A.guardarNota('${iso}')">Guardar nota</button></div></div></div>`:'';
  openModal(`<h3>Notas · ${esc(fmtDia(iso))}</h3>
    <div class="mbody">${filas}${alta}</div>
    <div class="mfoot"><button class="btn" onclick="A.closeModal()">Cerrar</button></div>`);
}
function avisoRecordatorios(){
  try{
    if(_avisoHecho) return;
    const hoy=todayISO();
    const rem=(S.notas||[]).filter(n=>n.recordatorio && n.fecha===hoy);
    if(!rem.length) return;
    _avisoHecho=true;
    const items=rem.map(n=>`<div class="canota"><div>${esc(n.texto).replace(/\n/g,'<br>')}</div>
      <div class="dim" style="font-size:10.5px;margin-top:4px">${esc(n.autor||'—')}</div></div>`).join('');
    openModal(`<h3>🔔 Recordatorio para hoy · ${esc(fmtCorto(hoy))}</h3>
      <div class="mbody"><div class="alert w">Tienes <b>${rem.length}</b> recordatorio(s) para hoy.</div>${items}</div>
      <div class="mfoot"><button class="btn" onclick="A.closeModal()">Entendido</button>
        <button class="btn pri" onclick="A.closeModal();A.go('calendario')">Ver en el calendario</button></div>`);
  }catch(e){}
}
A.calMes=(d)=>{ calYM=calAdd(calYM,d); render(); };
A.calHoy=()=>{ calYM=todayISO().slice(0,7); render(); };
A.abrirDia=(iso,editId)=>abrirDia(iso,editId);
A.recargarNotas=async()=>{ try{ S.notas=await NOTAS.load(); if(view==='calendario') render(); toast('Notas actualizadas.'); }
  catch(e){ toast('No se pudo actualizar: '+esc(errTxt(e))); } };
A.guardarNota=async(iso)=>{
  if(!puedoEditar()){ toast('Tu rol es de solo consulta.'); return; }
  const txt=($('nota_txt')?$('nota_txt').value:'').trim();
  const rec=$('nota_rec')?$('nota_rec').checked:false;
  if(!txt){ toast('Escribe algo en la nota.'); return; }
  try{ const n=await NOTAS.insert({fecha:iso,texto:txt,recordatorio:rec,autor:YO.nombre});
    S.notas.push(n); if(view==='calendario') render(); abrirDia(iso); toast('Nota guardada.'); }
  catch(e){ toast('No se pudo guardar: '+esc(errTxt(e))); }
};
A.guardarEdicionNota=async(id,iso)=>{
  if(!puedoEditar()){ toast('Tu rol es de solo consulta.'); return; }
  const txt=($('ednota_txt')?$('ednota_txt').value:'').trim();
  const rec=$('ednota_rec')?$('ednota_rec').checked:false;
  if(!txt){ toast('La nota no puede quedar vacía.'); return; }
  try{ const n=await NOTAS.update(id,{texto:txt,recordatorio:rec});
    const i=S.notas.findIndex(x=>String(x.id)===String(id)); if(i>=0) S.notas[i]=n;
    if(view==='calendario') render(); abrirDia(iso); toast('Nota actualizada.'); }
  catch(e){ toast('No se pudo actualizar: '+esc(errTxt(e))); }
};
A.borrarNota=async(id,iso)=>{
  if(!puedoEditar()){ toast('Tu rol es de solo consulta.'); return; }
  if(!confirm('¿Borrar esta nota?')) return;
  try{ await NOTAS.remove(id); S.notas=S.notas.filter(x=>String(x.id)!==String(id));
    if(view==='calendario') render(); abrirDia(iso); toast('Nota borrada.'); }
  catch(e){ toast('No se pudo borrar: '+esc(errTxt(e))); }
};

/* Añadir "Calendario" al menú, justo antes de la sección Control */
(function(){ const i=NAV.findIndex(n=>n.sep==='Control');
  const item={id:'calendario',t:'Calendario',ic:'cal'};
  if(!NAV.some(n=>n.id==='calendario')){ if(i>=0) NAV.splice(i,0,item); else NAV.push(item); } })();

/* Extender render() para dibujar el calendario, sin tocar el original */
const _render_prev=render;
render=function(){
  if(view==='calendario'){ renderNav(); if($('kpis'))$('kpis').innerHTML=''; vCalendario(); return; }
  return _render_prev.apply(this,arguments);
};
A.render=render;

/* Cargar notas y avisar de recordatorios de hoy */
(async function(){
  try{
    for(let i=0;i<40 && !APP_LISTA;i++) await new Promise(r=>setTimeout(r,400));
    if(!APP_LISTA || !YO.rol) return;
    try{ S.notas=await NOTAS.load(); }catch(e){ S.notas=S.notas||[]; }
    if(view==='calendario') render();
    avisoRecordatorios();
  }catch(e){}
})();

})();

<script>
/* ============================================================
   BLOQUE PRODUCCIÓN / ESTIMACIÓN · Totalizador por filtro
   100% ADITIVO — script propio, se pega al final del archivo.
   ============================================================ */
(function(){
if(typeof S==='undefined'||!S){ setTimeout(arguments.callee,400); return; }
if(window.__prodListo) return; window.__prodListo=true;

/* icono 'bars' para el menú, sin tocar el svg original */
const _svg_prev = svg;
svg = function(n){
  if(n==='bars') return '<svg class="ic" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="8"/><rect x="10" y="8" width="4" height="12"/><rect x="17" y="4" width="4" height="16"/></svg>';
  return _svg_prev(n);
};

function vProduccion(){
  if(!puedoEditar()){
    $('main').innerHTML=`<div class="card"><div class="empty">Vista de uso interno de gestión (delegado y coordinación).</div></div>`;
    return;
  }
  const lineas = filtra(enAmbito());
  // Deduplicar por fila: una fila con varios técnicos genera varias líneas,
  // pero el importe es del trabajo, no de cada técnico → no doblar.
  const vistas=new Set(), filas=[];
  lineas.forEach(l=>{ if(!vistas.has(l.fid)){ vistas.add(l.fid);
    const f=S.filas.find(x=>x.id===l.fid); if(f) filas.push(f); } });

  const nP=f=>Number(f.prod)||0, nE=f=>Number(f.esti)||0;
  const totP=filas.reduce((t,f)=>t+nP(f),0);
  const totE=filas.reduce((t,f)=>t+nE(f),0);
  const desv=totP-totE;
  const nImp=filas.filter(f=>nP(f)>0||nE(f)>0).length;
  const pct=totE>0?Math.round(totP/totE*100):null;

  const byCli={};
  filas.forEach(f=>{ const c=(f.cliente||'').trim()||'—';
    const o=byCli[c]||(byCli[c]={cliente:c,n:0,p:0,e:0});
    if(nP(f)>0||nE(f)>0) o.n++; o.p+=nP(f); o.e+=nE(f); });
  const rows=Object.values(byCli).filter(o=>o.p>0||o.e>0).sort((a,b)=>b.p-a.p);

  const amb = modo==='dia'? fmtDia(dia) : (fmtCorto(rango.desde)+' → '+fmtCorto(rango.hasta));
  const colDesv=d=> d<0?'var(--bad)':(d>0?'var(--ok)':'var(--dim)');

  const tabla = rows.map(o=>{ const d=o.p-o.e;
    return `<tr><td><b>${esc(o.cliente)}</b></td><td class="tar mono">${o.n}</td>
      <td class="tar mono">${nf(o.p,0)}</td><td class="tar mono">${nf(o.e,0)}</td>
      <td class="tar mono" style="color:${colDesv(d)}">${d>=0?'+':''}${nf(d,0)}</td></tr>`;
  }).join('') + (rows.length?`<tr style="background:#F7F9FC;font-weight:700">
      <td>TOTAL</td><td class="tar mono">${nImp}</td><td class="tar mono">${nf(totP,0)}</td>
      <td class="tar mono">${nf(totE,0)}</td><td class="tar mono">${desv>=0?'+':''}${nf(desv,0)}</td></tr>`:'');

  $('main').innerHTML=`
  <div class="phead"><div><h2>Producción y estimación</h2>
    <div class="sub">Suma de <b>Producción €</b> y <b>Estimación €</b> del rango y filtros seleccionados. Cada una por separado. Uso interno de gestión.</div></div></div>
  ${barraFecha()}${barraFiltros()}
  <div class="kpis" style="padding:0 0 11px">
    <div class="kpi g"><div class="k">Producción €</div><div class="v" style="font-size:19px;padding-top:3px">${nf(totP,0)} €</div><div class="s">${esc(amb)}</div></div>
    <div class="kpi a"><div class="k">Estimación €</div><div class="v" style="font-size:19px;padding-top:3px">${nf(totE,0)} €</div><div class="s">${nImp} trabajo(s) con importe</div></div>
    <div class="kpi ${desv<0?'b':(desv>0?'g':'')}"><div class="k">Desviación (Prod − Est)</div><div class="v" style="font-size:19px;padding-top:3px">${desv>=0?'+':''}${nf(desv,0)} €</div><div class="s">${pct!=null?pct+'% de la estimación':'sin estimación'}</div></div>
  </div>
  <div class="card"><div class="ch">${svg('bars')} Por cliente</div>

<script>
/* ============================================================
   BLOQUE · Ausencias agrupadas por rango en "Carga por técnico"
   100% ADITIVO — solo cambia la columna "No productivo".
   ============================================================ */
(function(){
if(typeof S==='undefined'||!S){ setTimeout(arguments.callee,400); return; }
if(window.__ausRangoListo) return; window.__ausRangoListo=true;

function _diaSemana(iso){ return new Date(iso+'T12:00:00').getDay(); } // 0=Dom .. 6=Sáb
function _continuaBloque(prev,cur){
  // cur sigue el bloque si entre prev y cur solo hay días de fin de semana
  let d=addDays(prev,1), pasos=0;
  while(d<cur && pasos<8){ const dw=_diaSemana(d); if(dw!==0 && dw!==6) return false; d=addDays(d,1); pasos++; }
  return d===cur;
}
function _dm(iso){ const d=new Date(iso+'T12:00:00');
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
function rangoAusTxt(ini,fin){
  if(ini===fin) return _dm(ini);
  const a=new Date(ini+'T12:00:00'), b=new Date(fin+'T12:00:00');
  if(a.getMonth()===b.getMonth() && a.getFullYear()===b.getFullYear())
    return String(a.getDate()).padStart(2,'0')+'–'+_dm(fin);   // 17–21/07
  return _dm(ini)+'–'+_dm(fin);                                 // 28/07–02/08
}
function agrupaAusencias(aus){
  const porTipo={};
  (aus||[]).forEach(a=>{ const t=a.tipo||'—'; (porTipo[t]=porTipo[t]||new Set()).add(a.fecha); });
  const bloques=[];
  Object.keys(porTipo).forEach(tipo=>{
    const dias=[...porTipo[tipo]].filter(Boolean).sort();
    let ini=null, fin=null;
    dias.forEach(d=>{
      if(ini===null){ ini=fin=d; }
      else if(_continuaBloque(fin,d)){ fin=d; }
      else { bloques.push({tipo,ini,fin}); ini=fin=d; }
    });
    if(ini!==null) bloques.push({tipo,ini,fin});
  });
  bloques.sort((a,b)=>a.ini.localeCompare(b.ini));
  return bloques;
}

/* Redefinir vTecnicos: idéntica, salvo la columna "No productivo" (rangos) */
vTecnicos = function(){
  const arr=filtra(enAmbito());
  const rows=uniqL(arr,l=>l.tecnico).map(t=>{
    const m=arr.filter(l=>l.tecnico===t), p=m.filter(l=>l.tipo==='PRODUCTIVO');
    return {t,m,h:p.reduce((s,l)=>s+(l.horas||0),0),cl:[...new Set(p.map(l=>l.cliente).filter(Boolean))],
      au:m.filter(l=>l.tipo!=='PRODUCTIVO')};
  }).sort((a,b)=>b.h-a.h);
  const mx=Math.max(1,...rows.map(r=>r.h));
  $('main').innerHTML=`<div class="phead"><div><h2>Carga por técnico</h2>
    <div class="sub">Horas imputadas y reparto de clientes. Las ausencias se agrupan por rango de fechas.</div></div></div>${barraFecha()}${barraFiltros()}
  <div class="card"><table class="t"><thead><tr><th>Técnico</th><th style="width:160px">Horas</th><th class="tar">Líneas</th><th>Clientes</th><th>No productivo</th></tr></thead><tbody>
  ${rows.length?rows.map(r=>`<tr><td><b>${esc(r.t)}</b></td>
    <td><div style="display:flex;align-items:center;gap:6px"><div class="bar" style="flex:1"><i style="width:${(r.h/mx*100).toFixed(0)}%"></i></div><span class="mono" style="width:38px;text-align:right">${nf(r.h,1)}</span></div></td>
    <td class="tar mono">${r.m.length}</td>
    <td>${r.cl.map(c=>`<span style="border-left:3px solid ${colorCli(c)};padding-left:5px;margin-right:7px;font-size:11.5px">${esc(c)}</span>`).join('')||'<span class="dim">—</span>'}
      ${r.cl.length>1?'<span class="badge b-warn">jornada partida</span>':''}</td>
    <td>${(()=>{const bl=agrupaAusencias(r.au);return bl.length?bl.map(b=>`<span class="badge b-gray" style="margin-right:4px">${esc(b.tipo)} ${esc(rangoAusTxt(b.ini,b.fin))}</span>`).join(''):'—';})()}</td></tr>`).join('')
   :'<tr><td colspan="5"><div class="empty">Sin datos.</div></td></tr>'}</tbody></table></div>`;
};

})();
</script>
<script>
/* ============================================================
   BLOQUE · Horas fuera de jornada (>8h L-V) por técnico y día
   100% ADITIVO — solo lectura, sin tocar nada. Sin Supabase.
   ============================================================ */
(function(){
if(typeof S==='undefined'||!S){ setTimeout(arguments.callee,400); return; }
if(window.__horasFueraListo) return; window.__horasFueraListo=true;

/* icono 'clock' para el menú, encadenado sin tocar el svg original */
const _svg_prev = svg;
svg = function(n){
  if(n==='clock') return '<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  return _svg_prev(n);
};

function vHorasFuera(){
  const lineas = filtra(enAmbito());
  const acc={};
  lineas.forEach(l=>{
    if(l.horas==null || !l.tecnico) return;                       // sin horas o sin técnico
    if(['VACACIONES','BAJA','FESTIVO'].includes(l.tipo)) return;  // ausencias fuera
    const k=l.tecnico+'|'+l.fecha;
    const o=acc[k]||(acc[k]={tecnico:l.tecnico,fecha:l.fecha,horas:0,horarios:[]});
    o.horas+=l.horas;
    if(l.horario) o.horarios.push(l.horario);
  });
  const dias=[];
  Object.values(acc).forEach(o=>{
    const dw=new Date(o.fecha+'T12:00:00').getDay();   // 0=Dom .. 6=Sáb
    if(dw===0||dw===6) return;                          // solo L-V
    const exceso=Math.round((o.horas-8)*100)/100;
    if(exceso>0) dias.push(Object.assign(o,{exceso}));
  });
  const porTec={};
  dias.forEach(d=>{ const o=porTec[d.tecnico]||(porTec[d.tecnico]={tecnico:d.tecnico,dias:0,horas:0});
    o.dias++; o.horas+=d.exceso; });
  const resumen=Object.values(porTec).sort((a,b)=>b.horas-a.horas);
  const totalExceso=dias.reduce((t,d)=>t+d.exceso,0);
  const maxDia=dias.reduce((m,d)=> d.exceso>(m?m.exceso:0)?d:m, null);
  dias.sort((a,b)=> b.fecha.localeCompare(a.fecha) || b.exceso-a.exceso);

  $('main').innerHTML=`
  <div class="phead"><div><h2>Horas fuera de jornada</h2>
    <div class="sub">Horas diarias que superan las <b>8 h</b> en días laborables (lunes a viernes), por técnico y por día. Para un periodo, pulsa <b>Ver rango → Mes</b>.</div></div></div>
  ${barraFecha()}${barraFiltros()}
  <div class="kpis" style="padding:0 0 11px">

<script>
/* ============================================================
   BLOQUE · Horas fuera de jornada v2 — finde y festivos = todo extra
   100% ADITIVO. Sobrescribe solo la vista 'horasfuera'.
   Festivos nacionales + autonómicos de Andalucía 2026 incluidos.
   Locales: se marcan a mano (tipo FESTIVO en la planificación).
   ============================================================ */
(function(){
if(typeof S==='undefined'||!S){ setTimeout(arguments.callee,400); return; }
if(window.__horasFuera2Listo) return; window.__horasFuera2Listo=true;

const FESTIVOS_AND_2026 = {
  '2026-01-01':'Año Nuevo','2026-01-06':'Reyes','2026-02-28':'Día de Andalucía',
  '2026-04-02':'Jueves Santo','2026-04-03':'Viernes Santo','2026-05-01':'Fiesta del Trabajo',
  '2026-08-15':'Asunción','2026-10-12':'Fiesta Nacional','2026-11-02':'Todos los Santos',
  '2026-12-07':'Constitución','2026-12-08':'Inmaculada','2026-12-25':'Navidad'
};

function vHorasFuera2(){
  const lineas = filtra(enAmbito());
  const festLocal = new Set();
  S.filas.forEach(f=>{ if(f.tipo==='FESTIVO' && f.fecha) festLocal.add(f.fecha); });
  const esFestivoNac = iso => FESTIVOS_AND_2026.hasOwnProperty(iso);
  const esFestivo = iso => esFestivoNac(iso) || festLocal.has(iso);

  const acc={};
  lineas.forEach(l=>{
    if(l.horas==null || !l.tecnico) return;
    if(['VACACIONES','BAJA','FESTIVO'].includes(l.tipo)) return;   // marcadores de no-trabajo
    const k=l.tecnico+'|'+l.fecha;
    const o=acc[k]||(acc[k]={tecnico:l.tecnico,fecha:l.fecha,horas:0,horarios:[]});
    o.horas+=l.horas;
    if(l.horario) o.horarios.push(l.horario);
  });

  const dias=[];
  Object.values(acc).forEach(o=>{
    const dw=new Date(o.fecha+'T12:00:00').getDay();   // 0=Dom .. 6=Sáb
    const finde=(dw===0||dw===6), festi=esFestivo(o.fecha);
    let exceso,motivo,clase;
    if(finde||festi){
      exceso=Math.round(o.horas*100)/100;
      motivo = festi ? (esFestivoNac(o.fecha)?FESTIVOS_AND_2026[o.fecha]:'Festivo local') : (dw===6?'Sábado':'Domingo');
      clase='b-pur';
    } else {
      exceso=Math.round((o.horas-8)*100)/100; motivo='+8 h'; clase='b-warn';
    }
    if(exceso>0) dias.push(Object.assign(o,{exceso,motivo,clase,finde,festi}));
  });

  const porTec={};
  dias.forEach(d=>{ const o=porTec[d.tecnico]||(porTec[d.tecnico]={tecnico:d.tecnico,dias:0,horas:0,he:0,ff:0});
    o.dias++; o.horas+=d.exceso; if(d.finde||d.festi) o.ff+=d.exceso; else o.he+=d.exceso; });
  const resumen=Object.values(porTec).sort((a,b)=>b.horas-a.horas);
  const totalExceso=dias.reduce((t,d)=>t+d.exceso,0);
  const totalFF=dias.filter(d=>d.finde||d.festi).reduce((t,d)=>t+d.exceso,0);
  const totalHE=totalExceso-totalFF;
  dias.sort((a,b)=> b.fecha.localeCompare(a.fecha) || b.exceso-a.exceso);
  const dow=['dom','lun','mar','mié','jue','vie','sáb'];

  $('main').innerHTML=`
  <div class="phead"><div><h2>Horas fuera de jornada</h2>
    <div class="sub">Días laborables: lo que pase de <b>8 h</b>. <b>Fin de semana y festivos: todas las horas del día</b>. Para un periodo, pulsa <b>Ver rango → Mes</b>.</div></div></div>
  ${barraFecha()}${barraFiltros()}
  <div class="kpis" style="padding:0 0 11px">
    <div class="kpi ${totalExceso>0?'w':'g'}"><div class="k">Total horas extra</div><div class="v">${nf(totalExceso,1)}</div><div class="s">${dias.length} día(s) con exceso</div></div>
    <div class="kpi"><div class="k">Exceso &gt;8h (L-V)</div><div class="v">${nf(totalHE,1)}</div><div class="s">días laborables</div></div>
    <div class="kpi b"><div class="k">Finde / festivo</div><div class="v">${nf(totalFF,1)}</div><div class="s">jornada completa</div></div>
    <div class="kpi a"><div class="k">Técnicos afectados</div><div class="v">${resumen.length}</div><div class="s">en el periodo</div></div>
  </div>
  ${resumen.length?`<div class="card"><div class="ch">${svg('clock')} Resumen por técnico</div>
    <table class="t"><thead><tr><th>Técnico</th><th class="tar">Días</th><th class="tar">Extra &gt;8h</th><th class="tar">Finde/festivo</th><th class="tar">Total</th></tr></thead><tbody>
    ${resumen.map(r=>`<tr><td><b>${esc(r.tecnico)}</b></td><td class="tar mono">${r.dias}</td>
      <td class="tar mono">${r.he>0?'+'+nf(r.he,1):'—'}</td>
      <td class="tar mono" style="color:var(--pur)">${r.ff>0?'+'+nf(r.ff,1):'—'}</td>
      <td class="tar mono" style="color:var(--warn);font-weight:700">+${nf(r.horas,1)}</td></tr>`).join('')}
    <tr style="background:#F7F9FC;font-weight:700"><td>TOTAL</td><td class="tar mono">${dias.length}</td>
      <td class="tar mono">+${nf(totalHE,1)}</td><td class="tar mono">+${nf(totalFF,1)}</td><td class="tar mono">+${nf(totalExceso,1)}</td></tr>
    </tbody></table></div>
  <div class="card"><div class="ch">Detalle por día</div>
    <table class="t"><thead><tr><th>Fecha</th><th>Motivo</th><th>Técnico</th><th class="tar">Horas día</th><th class="tar">Extra</th><th>Horario(s)</th></tr></thead><tbody>
    ${dias.map(d=>`<tr><td class="mono">${esc(fmtCorto(d.fecha))} <span class="dim" style="font-size:10px">${dow[new Date(d.fecha+'T12:00:00').getDay()]}</span></td>
      <td><span class="badge ${d.clase}">${esc(d.motivo)}</span></td>
      <td><b>${esc(d.tecnico)}</b></td>
      <td class="tar mono">${nf(d.horas,1)}</td>
      <td class="tar mono" style="color:var(--bad);font-weight:700">+${nf(d.exceso,1)}</td>
      <td class="mono dim" style="font-size:11px">${esc(d.horarios.join(' + ')||'—')}</td></tr>`).join('')}
    </tbody></table></div>`
   :`<div class="card"><div class="empty">Sin horas fuera de jornada en este periodo.</div></div>`}
  <div class="hint" style="margin-top:8px">Festivos nacionales y de Andalucía 2026 ya incluidos. <b>Festivos locales de Puerto Real</b>: márcalos con el tipo <b>FESTIVO</b> en la planificación y ese día contará como jornada completa extra.</div>`;
}

const _render_prev = render;
render = function(){
  if(view==='horasfuera'){ renderNav(); if($('kpis'))$('kpis').innerHTML=''; vHorasFuera2(); return; }
  return _render_prev.apply(this,arguments);
};
A.render = render;

})();
</script>

function esLaborable(iso,tec){
  if(!iso) return false;

function dm(iso){
  var d=new Date(iso+'T12:00:00');
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
}
function rangoTxt(a,b){
  if(a===b) return dm(a);
  var x=new Date(a+'T12:00:00'), y=new Date(b+'T12:00:00');
  if(x.getMonth()===y.getMonth() && x.getFullYear()===y.getFullYear()){
    return String(x.getDate()).padStart(2,'0')+'-'+dm(b);
  }
  return dm(a)+'-'+dm(b);
}
function agrupaDias(lista,tec){
  var out=[], ini=null, fin=null, n=0;
  for(var i=0;i<lista.length;i++){
    var d=lista[i];
    if(ini===null){ ini=d; fin=d; n=1; continue; }

    while(p<d && k<15){
      if(esLaborable(p,tec)){ sigue=false; break; }
      p=addDays(p,1); k++;
    }
    if(sigue && p===d){ fin=d; n++; }
    else { out.push({ini:ini,fin:fin,n:n}); ini=d; fin=d; n=1; }
  }
